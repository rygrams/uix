packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  '@base-ui/react': ^1.6.0
  '@types/node': ^24.13.2
  '@vitest/coverage-v8': '^4.1.9'
  date-fns: ^4.4.0
  eslint: ^9.39.4
  lucide-react: ^1.21.0
  prettier: ^3.8.4
  radix-ui: ^1.6.0
  react-day-picker: ^10.0.1
  recharts: ^3.9.0
  shadcn: ^4.11.0
  sonner: ^2.0.7
  typescript: ^6.0.3
  vitest: ^4.1.9
  zod: ^4.4.3
  react: ^19.2.7
  react-dom: ^19.2.7
  '@react-email/components': ^1.0.12
  '@react-email/render': ^2.0.9
  'next-themes': ^0.4.6
  nodemailer: ^9.0.1
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  tailwindcss: ^4.3.1
  '@thallesp/nestjs-better-auth': '2.6.1'
  'better-auth': '1.6.18'
  '@nestjs/config': ^4.0.0
  '@nestjs/swagger': ^11.0.0
  '@scalar/nestjs-api-reference': latest

minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.0'
  - '@turbo/darwin-arm64@2.10.0'
  - '@turbo/linux-64@2.10.0'
  - '@turbo/linux-arm64@2.10.0'
  - '@turbo/windows-64@2.10.0'
  - '@turbo/windows-arm64@2.10.0'
  - turbo@2.10.0

# Dépendances autorisées à exécuter leurs scripts de build natifs (pnpm 11).
allowBuilds:
  '@swc/core': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  '@scarf/scarf': false
