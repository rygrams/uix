name: Docker Build and Push

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        # TODO: replace image names with your own (e.g. myproject-api / myproject-web)
        # `name` must match the folder under apps/, `image` is the Docker Hub image name
        app:
          - { name: api, image: uix-api }
          - { name: web, image: uix-web }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Determine image tags
        id: meta
        run: |
          # Resolve the source branch across the different triggers
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')

          if [ "$BRANCH" = "dev" ]; then
            CHANNEL="candidate"
            VERSION_TAG="${VERSION}-rc"
          else
            CHANNEL="latest"
            VERSION_TAG="${VERSION}"
          fi

          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./apps/${{ matrix.app.name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_ORG }}/${{ matrix.app.image }}:${{ steps.meta.outputs.channel }}
            ${{ secrets.DOCKER_HUB_ORG }}/${{ matrix.app.image }}:${{ steps.meta.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
