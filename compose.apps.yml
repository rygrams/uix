name: uix

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://uix:uix@postgres:5432/uix
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      RUSTFS_ENDPOINT: rustfs
      RUSTFS_API_PORT: 9000
      RUSTFS_ACCESS_KEY: uixadmin
      RUSTFS_SECRET_KEY: uixsecretkey
      RUSTFS_BUCKET: uix
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:3000
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
